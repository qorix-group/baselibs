name: Restricted Paths Check
permissions:
  contents: read
  pull-requests: read
on:
  pull_request:
    branches:
      - main
    types: [opened, reopened, synchronize]
  merge_group:
    types: [checks_requested]
jobs:
  check-restricted-paths:
    name: Restricted file changes
    runs-on: ubuntu-slim
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
      - name: Detect changes in restricted paths
        uses: dorny/paths-filter@v4
        id: filter
        with:
          list-files: json
          filters: |
            restricted:
              - 'score/concurrency/**'
              - 'score/containers/**'
              - 'score/filesystem/**'
              - 'score/json/!(*parser*)'
              - 'score/json/!(internal)/**/*'
              - 'score/json/internal/!(parser|model)/**'
              - 'score/language/futurecpp/**'
              - 'score/language/safecpp/aborts_upon_exception/**'
              - 'score/language/safecpp/coverage_termination_handler/**'
              - 'score/language/safecpp/test/**'
              - 'score/memory/**/!(string_comparison_adaptor|string_literal)*'
              - 'score/mw/**'
              - 'score/network/**'
              - 'score/os/**'
              - 'score/quality/compiler_warnings/**'
              - 'score/static_reflection_with_serialization/**'
      - name: Block PR if restricted files are changed
        if: steps.filter.outputs.restricted == 'true' && github.event_name != 'merge_group'
        env:
          RESTRICTED_FILES: ${{ steps.filter.outputs.restricted_files }}
        run: |
          FILES=$(echo "$RESTRICTED_FILES" | jq -r '.[]')
          echo "::error::This PR modifies restricted paths that are not allowed to be changed directly. Changes to restricted paths follow a separate process: they must first be integrated into the internal codebase and then exported back. Please contact @4og for guidance on how to proceed."
          echo ""
          echo "$FILES" | while read -r file; do
            echo "::error file=${file},line=1::${file} is in a restricted path"
          done
          exit 1
